        {s: "He ______ (shoot) at the target while the noisy crowd watched.", a: "shot"},
        {s: "While the disease ______ (attack), the institution worked hard.", a: "was attacking"},
        {s: "They ______ (provide) few options while the space was limited.", a: "provided"},
        {s: "While the jet ______ (fly) abroad, the head stayed nearby.", a: "was flying"},
        {s: "The gunfire ______ (destroy) the peace while we were eating.", a: "destroyed"},
        {s: "While the brave girl ______ (take care of) the baby, she smiled.", a: "was taking care of"},
        {s: "She ______ (not/force) us while we were studying philosophy.", a: "didn't force"},
        {s: "While the trend ______ (grow), the society adapted quickly.", a: "was growing"},
        {s: "The jet ______ (fly) over the region while surprisingly it was sunny.", a: "was flying"}
    ];

    let sessionWords = [];
    let currentIndex = 0;
    let score = 0;
    let currentMode = 0;

    function toggleHelp() {
        const modal = document.getElementById("helpModal");
        modal.style.display = (modal.style.display === "block") ? "none" : "block";
    }

    function returnToMenu() {
        document.getElementById('menu').classList.remove('hidden');
        document.getElementById('game-zone').classList.add('hidden');
        document.getElementById('summary-zone').classList.add('hidden');
    }

    function startSession(mode) {
        currentMode = mode;
        score = 0;
        currentIndex = 0;
        let pool;
        if (mode === 6) pool = [...grammarQuestions];
        else if (mode === 5) pool = [...completionQuestions];
        else pool = [...vocabulary];
        
        sessionWords = pool.sort(() => 0.5 - Math.random()).slice(0, 10);
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('game-zone').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const item = sessionWords[currentIndex];
        document.getElementById('q-num').innerText = currentIndex + 1;
        document.getElementById('feedback').classList.add('hidden');
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('user-input').value = "";
        const display = document.getElementById('display-word');
        const optionsArea = document.getElementById('options-area');
        const inputArea = document.getElementById('input-area');
        const sentContainer = document.getElementById('sentence-container');
        
        optionsArea.innerHTML = "";
        inputArea.classList.add('hidden');
        sentContainer.classList.add('hidden');

        if (currentMode === 6) { 
            sentContainer.classList.remove('hidden');
            sentContainer.innerText = item.s;
            display.innerText = "הקלידי את ההטיה הנכונה:";
            inputArea.classList.remove('hidden');
        } else if (currentMode === 5) { 
            sentContainer.classList.remove('hidden');
            sentContainer.innerText = item.s;
            display.innerText = "בחרי את המילה המתאימה:";
            generateOptions(item.e, 'e');
        } else if (currentMode === 1) { 
            display.innerText = item.e;
            generateOptions(item.h, 'h');
        } else if (currentMode === 2) { 
            display.innerText = item.h;
            generateOptions(item.e, 'e');
        } else if (currentMode === 3) { 
            display.innerText = item.h;
            inputArea.classList.remove('hidden');
        }
    }

    function generateOptions(correct, key) {
        let opts = [correct];
        while(opts.length < 4) {
            let rand = vocabulary[Math.floor(Math.random() * vocabulary.length)];
            let val = (key === 'e' ? rand.e : rand.h);
            if(!opts.includes(val)) opts.push(val);
        }
        opts.sort(() => 0.5 - Math.random());
        opts.forEach(o => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = o;
            btn.onclick = () => {
                document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
                showFeedback(o === correct, correct);
            };
            document.getElementById('options-area').appendChild(btn);
        });
    }

    function checkAnswer() {
        const item = sessionWords[currentIndex];
        const input = document.getElementById('user-input').value.trim().toLowerCase();
        let correctVal = (currentMode === 6 ? item.a : (currentMode === 5 ? item.e : item.e));
        if (currentMode === 3) correctVal = item.e;
        showFeedback(input === correctVal.toLowerCase(), correctVal);
    }

    function showFeedback(isCorrect, correctVal) {
        const f = document.getElementById('feedback');
        f.classList.remove('hidden');
        if(isCorrect) {
            score++;
            f.innerText = "מצוין! ⭐";
            f.className = "feedback correct";
        } else {
            f.innerHTML = "לא נורא, התשובה היא: " + "<span dir='ltr'>" + correctVal + "</span>";
            f.className = "feedback incorrect";
        }
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function nextQuestion() {
        currentIndex++;
        if(currentIndex < 10) showQuestion();
        else showSummary();
    }

    function showSummary() {
        document.getElementById('game-zone').classList.add('hidden');
        document.getElementById('summary-zone').classList.remove('hidden');
        document.getElementById('final-grade').innerText = (score * 10) + "%";
    }

    window.onclick = function(event) {
        const modal = document.getElementById("helpModal");
        if (event.target == modal) modal.style.display = "none";
    }
</script>
</body>
</html>
