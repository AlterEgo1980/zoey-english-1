<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoey's English App ⭐</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f7ff; text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 2px solid #e0e0e0; }
        h1 { color: #2c3e50; font-size: 28px; margin-bottom: 10px; }
        .stars { color: #f1c40f; font-size: 24px; margin-bottom: 20px; }
        .menu-btn { background-color: #4a90e2; color: white; border: none; padding: 15px; margin: 8px; border-radius: 12px; cursor: pointer; font-size: 16px; width: 100%; transition: 0.2s; font-weight: bold; }
        .menu-btn:hover { background-color: #357abd; transform: scale(1.02); }
        .hidden { display: none; }
        .word-box { font-size: 28px; font-weight: bold; margin-bottom: 20px; color: #34495e; }
        .hint { font-size: 16px; color: #7f8c8d; margin-bottom: 10px; font-style: italic; }
        input[type="text"] { width: 90%; padding: 12px; font-size: 18px; border: 2px solid #4a90e2; border-radius: 10px; margin-bottom: 15px; text-align: center; outline: none; }
        .feedback { padding: 15px; border-radius: 10px; margin-top: 15px; font-weight: bold; }
        .correct { background-color: #2ecc71; color: white; }
        .incorrect { background-color: #f1c40f; color: #2c3e50; border: 1px solid #d4ac0d; }
        .score-display { font-size: 18px; margin-bottom: 10px; color: #7f8c8d; font-weight: bold; }
        .final-score { font-size: 40px; color: #2ecc71; margin: 20px 0; font-weight: bold; }
        .next-btn { background-color: #34495e; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; }
        .opt-btn { background: #fff; border: 2px solid #4a90e2; color: #4a90e2; padding: 12px; margin: 6px; width: 100%; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.2s; text-align: left; direction: ltr; }
        .opt-btn:hover { background: #eef6ff; }
        .sentence-box { font-size: 20px; line-height: 1.6; margin-bottom: 20px; background: #fdfdfd; padding: 20px; border-radius: 15px; border-right: 6px solid #8e44ad; text-align: left; direction: ltr; }
        .pos { font-size: 14px; color: #e67e22; font-weight: normal; margin-left: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div id="menu">
        <div class="stars">⭐⭐⭐</div>
        <h1>Zoey's English App</h1>
        <div class="stars">⭐⭐⭐</div>
        <p>בחרי תרגול (82 מילים במאגר):</p>
        <button class="menu-btn" onclick="startSession(1)">אנגלית ← עברית</button>
        <button class="menu-btn" onclick="startSession(2)">עברית ← אנגלית</button>
        <button class="menu-btn" onclick="startSession(3)">כתיבה (עברית ל-אנגלית)</button>
        <button class="menu-btn" style="background-color: #8e44ad;" onclick="startSession(5)">השלמת משפטים (מקיף 82 מילים)</button>
    </div>

    <div id="game-zone" class="hidden">
        <div class="score-display">שאלה <span id="q-num">1</span> מתוך 10</div>
        <div id="sentence-container" class="sentence-box hidden"></div>
        <div class="word-box" id="display-word"></div>
        <div id="hint-text" class="hint"></div>
        <div id="options-area"></div>
        <div id="input-area" class="hidden">
            <input type="text" id="user-input" autocomplete="off" placeholder="כתבי כאן...">
            <button class="next-btn" onclick="checkAnswer()">בדיקה</button>
        </div>
        <div id="feedback" class="feedback hidden"></div>
        <button id="next-btn" class="next-btn hidden" style="margin-top:10px; background-color: #27ae60;" onclick="nextQuestion()">המשיכי ➔</button>
        <button class="menu-btn" style="background: none; color: #95a5a6; font-size: 13px; text-decoration: underline;" onclick="returnToMenu()">חזרה לתפריט</button>
    </div>

    <div id="summary-zone" class="hidden">
        <h1>כל הכבוד, זואי! ⭐</h1>
        <div class="final-score"><span id="final-grade">0</span></div>
        <button class="menu-btn" onclick="returnToMenu()">תרגול נוסף</button>
    </div>
</div>

<script>
    const vocabulary = [
        // Part 1 & 2 combined - Total 82 items
        {e: "active", h: "פעיל", p: "(adj)", s: "She is very ______ in sports and plays every day."},
        {e: "apology", h: "התנצלות", p: "(for) (n)", s: "He sent a sincere ______ for being late."},
        {e: "as well", h: "גם", p: "", s: "I like pizza, and I like pasta ______."},
        {e: "be familiar with", h: "להיות מוכר עם", p: "", s: "Are you ______ with this song?"},
        {e: "bear", h: "לשאת/לסבול", p: "(v)", s: "I can't ______ the sound of that loud music!"},
        {e: "beat", h: "להביס/להכות", p: "(v)", s: "Our team managed to ______ the champions."},
        {e: "belong to", h: "שייך ל", p: "(v)", s: "Does this book ______ you?"},
        {e: "blame", h: "להאשים", p: "(for) (n, v)", s: "Don't ______ me for the broken window."},
        {e: "bully", h: "בריון", p: "(n, v)", s: "The school ______ was suspended for a week."},
        {e: "case", h: "מקרה", p: "(n)", s: "In this ______, we need to call the doctor."},
        {e: "claim", h: "לטעון", p: "(v)", s: "The company ______s that their product is the best."},
        {e: "confidence", h: "ביטחון", p: "(n)", s: "She has the ______ to speak in front of everyone."},
        {e: "cry", h: "לבכות", p: "(for) (v)", s: "Don't ______ over spilled milk."},
        {e: "deal with", h: "להתמודד עם", p: "(v)", s: "How do you ______ stressful situations?"},
        {e: "demand", h: "דרישה", p: "(for) (n, v)", s: "There is a high ______ for new iPhones."},
        {e: "differ", h: "להיות שונה", p: "(from) (v)", s: "How does this car ______ from that one?"},
        {e: "e.g.", h: "למשל", p: "", s: "You can buy many fruits, ______ apples and oranges."},
        {e: "figure", h: "דמות/מספר/גזרה", p: "(n)", s: "He is a famous ______ in the history of science."},
        {e: "find out", h: "לגלות", p: "(v)", s: "I need to ______ where she lives."},
        {e: "give in", h: "לוותר/להיכנע", p: "(v)", s: "The enemy finally had to ______."},
        {e: "in addition", h: "בנוסף", p: "", s: "______, we need to think about the cost."},
        {e: "kick", h: "בעיטה", p: "(n, v)", s: "He gave the ball a strong ______."},
        {e: "lack", h: "חוסר", p: "(of) (n, v)", s: "The plants died because of a ______ of water."},
        {e: "leave out", h: "להשמיט", p: "(v)", s: "Don't ______ any names on the list."},
        {e: "look", h: "להביט", p: "(v)", s: "Please ______ at the whiteboard."},
        {e: "maintenance", h: "תחזוקה", p: "(n)", s: "Car ______ can be very expensive."},
        {e: "majority", h: "רוב", p: "(of) (n)", s: "The ______ of students prefer summer over winter."},
        {e: "more and more", h: "יותר ויותר", p: "", s: "______ people are using electric cars today."},
        {e: "overseas", h: "מעבר לים", p: "(adj, adv)", s: "They love to travel ______, especially to Europe."},
        {e: "principal", h: "עיקרי", p: "(adj)", s: "The ______ reason I am here is to help you."},
        {e: "push", h: "דחיפה", p: "(n, v)", s: "If the door is stuck, give it a ______."},
        {e: "refuse", h: "לסרב", p: "(v)", s: "I ______ to eat broccoli!"},
        {e: "regular", h: "קבוע/רגיל", p: "(adj)", s: "He has a ______ job and works every Monday."},
        {e: "side", h: "צד", p: "(n)", s: "Which ______ of the bed do you prefer?"},
        {e: "social", h: "חברתי", p: "(adj)", s: "She is a very ______ person and has many friends."},
        {e: "source", h: "מקור", p: "(of) (n)", s: "The sun is our main ______ of light."},
        {e: "strike", h: "שביתה/מכה", p: "(n, v)", s: "The teachers went on a ______ for better pay."},
        {e: "tend", h: "נוטה ל", p: "(to) (v)", s: "I ______ to get sleepy after a big meal."},
        {e: "through", h: "דרך", p: "(prep)", s: "We walked ______ the forest to get home."},
        {e: "treat", h: "להתייחס/לטפל", p: "(v)", s: "You should ______ others with respect."},
        {e: "unable", h: "לא מסוגל", p: "(adj)", s: "I am ______ to open this jar."},
        {e: "unfriendly", h: "לא ידידותי", p: "(adj)", s: "The new neighbor seems a bit ______."},
        {e: "victim", h: "קורבן", p: "(n)", s: "The ______ of the robbery was not hurt."},
        {e: "affect", h: "להשפיע", p: "(v)", s: "The weather can ______ our mood."},
        {e: "aim", h: "מטרה/לכוון", p: "(n, v)", s: "Our ______ is to finish the project by Friday."},
        {e: "anticipate", h: "לצפות", p: "(v)", s: "We ______ that the party will be great."},
        {e: "as soon as", h: "ברגע ש", p: "", s: "Call me ______ you arrive."},
        {e: "attitude", h: "גישה", p: "(n)", s: "She has a very positive ______ toward life."},
        {e: "behavior", h: "התנהגות", p: "(n)", s: "His ______ in class was excellent."},
        {e: "can", h: "פחית", p: "(n)", s: "I drank a ______ of soda."},
        {e: "comment", h: "תגובה/להגיב", p: "(n, v)", s: "Do you have any ______s about the movie?"},
        {e: "connect", h: "לחבר", p: "(v)", s: "Please ______ the printer to the computer."},
        {e: "create", h: "ליצור", p: "(v)", s: "The artist wants to ______ something unique."},
        {e: "develop", h: "לפתח", p: "(v)", s: "The city began to ______ very fast."},
        {e: "direction", h: "כיוון", p: "(n)", s: "Which ______ is the train going?"},
        {e: "fair", h: "הוגן", p: "(adj)", s: "It's not ______ that he got two cookies and I got one."},
        {e: "feature", h: "מאפיין", p: "(n, v)", s: "This phone has a great camera ______."},
        {e: "fight", h: "להילחם", p: "(n, v)", s: "They used to ______ a lot when they were kids."},
        {e: "goal", h: "מטרה", p: "(n)", s: "My ______ is to become a pilot."},
        {e: "immediate", h: "מיידי", p: "(adj)", s: "I need an ______ answer to my question."},
        {e: "moment", h: "רגע", p: "(n)", s: "Wait just a ______, I'm coming!"},
        {e: "potential", h: "פוטנציאל", p: "(adj, n)", s: "She has the ______ to be a great leader."},
        {e: "worried", h: "מודאג", p: "(adj)", s: "I'm ______ about my dog's health."},
        {e: "that depends", h: "זה תלוי", p: "", s: "Can we go tomorrow? - ______, if it rains we won't."},
        {e: "it's a deal", h: "עסקנו/סוכם", p: "", s: "I'll give you ten sheקels. - ______, here is the pen."},
        {e: "social media", h: "רשתות חברתיות", p: "(n)", s: "She spends a lot of time on ______."},
        {e: "bullying", h: "בריונות", p: "(n)", s: "The school is fighting against ______."},
        {e: "confident", h: "בטוח בעצמו", p: "(adj)", s: "He feels ______ about passing the test."},
        {e: "difference", h: "הבדל", p: "(n)", s: "What is the ______ between these two colors?"},
        {e: "give up", h: "לוותר", p: "(v)", s: "Never ______ on your dreams!"},
        {e: "look after", h: "לטפל ב", p: "(v)", s: "Can you ______ my cat while I am away?"},
        {e: "look for", h: "לחפש", p: "(v)", s: "I am ______ing for my lost keys."},
        {e: "look forward to", h: "לצפות ל", p: "(v)", s: "I ______ meeting you soon."},
        {e: "mostly", h: "בעיקר", p: "(adv)", s: "The students in this class are ______ girls."},
        {e: "on the other hand", h: "מצד שני", p: "", s: "It's expensive, but ______ it's high quality."},
        {e: "refusal", h: "סירוב", p: "(n)", s: "His ______ to help us was surprising."},
        {e: "regularly", h: "באופן קבוע", p: "(adv)", s: "You should exercise ______."},
        {e: "socialize", h: "להתחבר חברתית", p: "(v)", s: "It's important to ______ with your classmates."},
        {e: "treatment", h: "טיפול", p: "(n)", s: "The doctor gave him a new ______."},
        {e: "unable to", h: "לא מסוגל ל", p: "", s: "He was ______ finish the race."},
        {e: "victimization", h: "הפיכה לקורבן", p: "(n)", s: "The program aims to stop ______ in schools."},
        {e: "immediately", h: "מיד", p: "(adv)", s: "Please come here ______!"}
    ];

    let sessionWords = [];
    let currentIndex = 0;
    let score = 0;
    let currentMode = 0;

    function returnToMenu() {
        document.getElementById('menu').classList.remove('hidden');
        document.getElementById('game-zone').classList.add('hidden');
        document.getElementById('summary-zone').classList.add('hidden');
    }

    function startSession(mode) {
        currentMode = mode;
        score = 0;
        currentIndex = 0;
        sessionWords = [...vocabulary].sort(() => 0.5 - Math.random()).slice(0, 10);
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('game-zone').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const item = sessionWords[currentIndex];
        document.getElementById('q-num').innerText = currentIndex + 1;
        document.getElementById('feedback').classList.add('hidden');
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('user-input').value = "";
        const display = document.getElementById('display-word');
        const hint = document.getElementById('hint-text');
        const optionsArea = document.getElementById('options-area');
        const inputArea = document.getElementById('input-area');
        const sentContainer = document.getElementById('sentence-container');
        
        optionsArea.innerHTML = "";
        hint.innerText = "";
        inputArea.classList.add('hidden');
        sentContainer.classList.add('hidden');

        if (currentMode === 1) { 
            display.innerHTML = item.e + ` <span class="pos">${item.p}</span>`;
            generateOptions(item.h, 'h');
        } else if (currentMode === 2) { 
            display.innerText = item.h;
            generateOptions(item.e, 'e', true);
        } else if (currentMode === 3) { 
            display.innerText = item.h;
            hint.innerText = "רמז: " + getHint(item.e) + " " + item.p;
            inputArea.classList.remove('hidden');
        } else if (currentMode === 5) { 
            sentContainer.classList.remove('hidden');
            sentContainer.innerText = item.s;
            display.innerText = "בחרי את המילה המתאימה:";
            generateOptions(item.e, 'e', true);
        }
    }

    function getHint(str) {
        let parts = str.split(" ");
        if (parts.length > 1) return parts[0] + " " + parts[1].charAt(0) + "...";
        return str.charAt(0) + "...";
    }

    function generateOptions(correct, key, showPOS = false) {
        let opts = [correct];
        while(opts.length < 5) {
            let rand = vocabulary[Math.floor(Math.random() * vocabulary.length)];
            let val = (key === 'e' ? rand.e : rand.h);
            if(!opts.includes(val)) opts.push(val);
        }
        opts.sort(() => 0.5 - Math.random());
        opts.forEach(o => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            let posSuffix = "";
            if (showPOS) {
                let match = vocabulary.find(v => v.e === o || v.h === o);
                if (match) posSuffix = " " + match.p;
            }
            btn.innerText = o + posSuffix;
            btn.onclick = () => {
                document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
                showFeedback(o === correct, correct);
            };
            document.getElementById('options-area').appendChild(btn);
        });
    }

    function checkAnswer() {
        const item = sessionWords[currentIndex];
        const input = document.getElementById('user-input').value.trim().toLowerCase();
        let correctVal = (currentMode === 3 ? item.e : item.h);
        showFeedback(input === correctVal.toLowerCase(), correctVal);
    }

    function showFeedback(isCorrect, correctVal) {
        const f = document.getElementById('feedback');
        f.classList.remove('hidden');
        if(isCorrect) {
            score++;
            f.innerText = "נכון מאוד! ⭐";
            f.className = "feedback correct";
        } else {
            f.innerHTML = "התשובה הנכונה היא: " + "<span dir='ltr' style='font-weight:bold'>" + correctVal + "</span>";
            f.className = "feedback incorrect";
        }
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function nextQuestion() {
        currentIndex++;
        if(currentIndex < 10) showQuestion();
        else showSummary();
    }

    function showSummary() {
        document.getElementById('game-zone').classList.add('hidden');
        document.getElementById('summary-zone').classList.remove('hidden');
        document.getElementById('final-grade').innerText = (score * 10) + "%";
    }
</script>
</body>
</html>
